<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión - CaliCambalache</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col justify-center py-12 sm:px-6 lg:px-8">
    <a href="#main" class="sr-only focus:not-sr-only bg-primary text-white px-4 py-2 absolute top-0 left-0 z-50">Saltar al contenido</a>
    <main id="main" class="sm:mx-auto sm:w-full sm:max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-primary flex items-center justify-center gap-2">
                <svg class="w-10 h-10" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                CaliCambalache
            </h1>
            <h2 class="mt-4 text-2xl font-bold">Bienvenido de vuelta</h2>
            <p class="mt-2 text-sm text-gray-600">Conectando alimentos con quienes más lo necesitan</p>
        </div>

        <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10 border border-gray-100">
            <div id="error-global" role="alert" aria-live="assertive" class="hidden mb-6 p-4 bg-red-50 text-red-700 border border-red-200 rounded-md text-sm font-medium"></div>

            <form id="form-login" class="space-y-6" novalidate>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Correo electrónico</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <input id="email" type="email" autocomplete="email" aria-describedby="email-error" aria-required="true"
                            class="appearance-none block w-full px-3 py-3 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                    </div>
                    <span id="email-error" class="hidden text-red-600 text-sm mt-1"></span>
                </div>

                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <input id="password" type="password" autocomplete="current-password" aria-describedby="password-error" aria-required="true"
                            class="appearance-none block w-full px-3 py-3 pr-10 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 sm:text-sm">
                        <button type="button" id="toggle-password" aria-label="Mostrar contraseña" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600 focus:outline-none focus:ring-2 focus:ring-primary-500 rounded">
                            <svg class="h-5 w-5" aria-hidden="true" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                        </button>
                    </div>
                    <span id="password-error" class="hidden text-red-600 text-sm mt-1"></span>
                </div>

                <div class="flex items-center justify-end">
                    <div class="text-sm">
                        <a href="#" class="font-medium text-primary hover:text-primary-500 focus:ring-2 focus:ring-primary-500 rounded outline-none">¿Olvidaste tu contraseña?</a>
                    </div>
                </div>

                <div>
                    <button type="submit" id="btn-login" class="w-full flex justify-center items-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-primary hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-colors disabled:opacity-75 disabled:cursor-not-allowed">
                        <svg id="spinner-login" class="hidden animate-spin -ml-1 mr-2 h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" aria-hidden="true">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span id="texto-btn">Ingresar</span>
                    </button>
                </div>
            </form>

            <div class="mt-6 text-center">
                <p class="text-sm text-gray-600">¿No tienes cuenta? <a href="/pages/registro.html" class="font-medium text-primary hover:text-primary-500 focus:ring-2 focus:ring-primary-500 rounded outline-none">Regístrate aquí</a></p>
            </div>
        </div>
    </main>

    <script type="module" src="/js/login.js"></script>
</body>
</html>
