<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Receptora — CaliCambalache</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen">
    <nav class="bg-white shadow-sm border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-2xl mr-2">🏠</span>
                    <span class="font-bold text-xl text-primary">CaliCambalache</span>
                </div>
                <div class="flex items-center" id="user-menu">
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-lg shadow px-5 py-6 sm:px-6">
            <h1 class="text-3xl font-bold text-gray-900 mb-4">Panel de Organización Receptora</h1>
            <p class="text-gray-600 mb-8">Aquí puedes explorar alimentos disponibles y gestionar tus solicitudes.</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-secondary-50 p-6 rounded-lg border border-secondary-100 flex items-center justify-between">
                    <div>
                        <h3 class="font-bold text-xl text-secondary-900">Buscar Alimentos</h3>
                        <p class="text-sm text-secondary-700 mt-1">Explorar donaciones cercanas</p>
                    </div>
                    <div class="text-secondary text-5xl">🔍</div>
                </div>
                <div class="bg-primary-50 p-6 rounded-lg border border-primary-100 flex items-center justify-between">
                    <div>
                        <h3 class="font-bold text-xl text-primary-900">Mis Solicitudes</h3>
                        <p class="text-sm text-primary-700 mt-1">Estado de entregas</p>
                    </div>
                    <div class="text-primary text-5xl">📋</div>
                </div>
            </div>
        </div>
    </main>

    <script type="module" src="/js/app.js"></script>
    <script type="module" src="/js/receptora/dashboard.js"></script>
</body>
</html>
