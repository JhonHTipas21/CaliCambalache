<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Registro — Cali Cambalache">
  <title>Registro — Cali Cambalache</title>
  <link rel="stylesheet" href="/docs/css/styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="/docs/index.html" class="navbar-brand">
      <span class="logo-tri">A</span>
      Cali Cambalache
    </a>
    <div class="navbar-links">
      <a href="/docs/index.html">Inicio</a>
      <a href="/docs/donante/crear-publicacion.html">Donar</a>
      <a href="/docs/mensajes.html">Mensajes</a>
    </div>
    <a href="/docs/donante/perfil.html" class="navbar-profile">
      <span class="profile-icon">A</span>
      Perfil
    </a>
  </nav>

  <!-- REGISTRO FORM -->
  <div class="form-wrapper">
    <div class="form-card">
      <h2 class="text-center">Crea tu cuenta 🌱</h2>
      <p class="form-subtitle text-center">Únete a Cali Cambalache y comienza a hacer impacto</p>

      <form id="registroForm">
        <div class="form-group">
          <label for="nombreCompleto">Nombre Completo</label>
          <input type="text" id="nombreCompleto" class="form-control" placeholder="Tu nombre" required>
        </div>

        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
        </div>

        <div class="form-group">
          <label for="tel">Teléfono</label>
          <input type="tel" id="tel" class="form-control" placeholder="+57 3XX XXX XXXX">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres" required>
          <div id="password-strength-bar" style="height: 4px; margin-top: 5px; transition: all 0.3s;"></div>
        </div>

        <div class="form-group">
          <label for="confirmarPassword">Confirmar Contraseña</label>
          <input type="password" id="confirmarPassword" class="form-control" placeholder="Repite la contraseña" required>
        </div>

        <div class="form-group">
          <label for="rol">Tipo de cuenta</label>
          <!-- Se usa id="rolForm" porque js/registro.js lo espera -->
          <div id="rolForm" class="flex gap-4">
            <label class="flex items-center gap-2">
              <input type="radio" name="rol" value="donante" checked>
              Donante
            </label>
            <label class="flex items-center gap-2">
              <input type="radio" name="rol" value="receptora">
              Organización Receptora
            </label>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block mt-4" id="btnSubmit">
          Crear cuenta
        </button>
      </form>

      <div style="text-align:center; margin:var(--sp-6) 0 var(--sp-2); color:var(--gray-400); font-size:0.8125rem;">— o —</div>

      <p class="text-center text-sm">
        ¿Ya tienes cuenta?
        <a href="/docs/login.html" style="color:var(--orange-500); font-weight:600;">Inicia sesión</a>
      </p>
    </div>
  </div>

  <script type="module" src="../js/app.js"></script>
  <script type="module" src="../js/registro.js"></script>
</body>

</html>
