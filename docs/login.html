<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Iniciar sesión — Cali Cambalache">
  <title>Iniciar Sesión — Cali Cambalache</title>
  <link rel="stylesheet" href="/docs/css/styles.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="/docs/index.html" class="navbar-brand">
      <span class="logo-tri">A</span>
      Cali Cambalache
    </a>
    <div class="navbar-links">
      <a href="/docs/index.html">Inicio</a>
      <a href="/docs/donante/crear-publicacion.html">Donar</a>
      <a href="/docs/mensajes.html">Mensajes</a>
    </div>
    <a href="/docs/donante/perfil.html" class="navbar-profile">
      <span class="profile-icon">A</span>
      Perfil
    </a>
  </nav>

  <!-- LOGIN FORM -->
  <div class="form-wrapper">
    <div class="form-card">
      <h2 class="text-center">Bienvenido de vuelta 👋</h2>
      <p class="form-subtitle text-center">Inicia sesión en tu cuenta de Cali Cambalache</p>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="tu@correo.com" required>
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block mt-4" id="btnSubmit">
          Iniciar Sesión
        </button>
      </form>

      <div style="text-align:center; margin:var(--sp-6) 0 var(--sp-2); color:var(--gray-400); font-size:0.8125rem;">— o —</div>

      <p class="text-center text-sm">
        ¿No tienes cuenta?
        <a href="/docs/registro.html" style="color:var(--orange-500); font-weight:600;">Regístrate aquí</a>
      </p>
      <p class="text-center text-sm mt-2">
        <a href="/docs/index.html" style="color:var(--gray-500);">← Volver al inicio</a>
      </p>
    </div>
  </div>

  <script type="module" src="../js/app.js"></script>
  <script type="module" src="../js/login.js"></script>
</body>

</html>
